id: nasa-grace-land-mascons
title: GRACE/GRACE-FO Land Mass Concentration (Mascon) Time Series
description: >
  NASA/JPL gridded time series of terrestrial water storage changes from the
  GRACE and GRACE-FO gravity missions. Used for drought, groundwater, and ice
  mass balance studies at regional to global scales.
